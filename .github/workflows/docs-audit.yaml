name: Weekly Documentation Sync

on:
  schedule:
    # Runs Weekly on Sunday 6:00 AM UTC
    - cron: '0 6 * * 0'
  workflow_dispatch: 

permissions:
  contents: write
  pull-requests: write

jobs:
  docs-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: shaftoe/pi-coding-agent-action@v2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          provider: opencode
          model: nemotron-3-ultra-free
          token: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            Check if the documentation is up to date with the latest code changes.
            Review README.md and inline code comments.
            Additionally, review if any installation docs are inline with the most recent git tag.
            If you find discrepancies, create a pull request with the necessary documentation updates.
          branch_name_template: 'docs/{title}-{number}'
